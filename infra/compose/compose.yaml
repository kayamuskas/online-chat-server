# Phase 1 Compose topology
# Five-service stack: postgres, redis, api, worker, web
# Health-gated startup: api, worker, and web depend on healthy infrastructure

name: chat

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
    volumes:
      - ../../.volumes/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chat} -d ${POSTGRES_DB:-chat}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:8
    restart: unless-stopped
    volumes:
      - ../../.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Application services ────────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3000
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
      # Path where MockMailService writes reset-link artifacts (QA-inspectable)
      MAIL_OUTBOX_DIR: /app/mail-outbox
      # Path where uploaded files are stored (Phase 7, D-48, D-55)
      UPLOADS_DIR: /app/uploads
      # Base URL embedded in reset links (override for non-localhost deployments)
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4173}
      # Only this frontend origin may make credentialed browser requests.
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:4173}
      # SMTP config (optional — when SMTP_HOST is set, real emails are sent)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@chat.local}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Narrow writable mount for mock mail artifacts only.
      # The rest of the API container filesystem remains read-only.
      # QA can inspect generated reset-link artifacts at .volumes/mail-outbox/ on the host.
      - ../../.volumes/mail-outbox:/app/mail-outbox
      - ../../.volumes/uploads:/app/uploads

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-4173}:4173"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4173/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
