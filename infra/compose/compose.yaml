# Phase 1 Compose topology
# Five-service stack: postgres, redis, api, worker, web
# Health-gated startup: api, worker, and web depend on healthy infrastructure
# Offline mode: pull_policy: never on app services; base images must be pre-pulled

name: chat

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:18
    # pull_policy: never # TBD
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
    volumes:
      - ../../.volumes/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chat} -d ${POSTGRES_DB:-chat}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:8
    # pull_policy: never # TBD
    restart: unless-stopped
    volumes:
      - ../../.volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Application services ────────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    pull_policy: never
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    pull_policy: never
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_USER: ${POSTGRES_USER:-chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat}
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    pull_policy: never
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-4173}:4173"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4173/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp

